<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeaConnect Settings</title>

<style>

/* HEADER */
.appHeader{
position:fixed;
top:0;
left:0;
right:0;
height:60px;
background:#ffffff;

display:flex;
align-items:center;
justify-content:center;

font-size:20px;
font-weight:900;
letter-spacing:1px;

border-bottom:1px solid #e5e7eb;
z-index:1000;
}

/* BACK BUTTON */
.backBtn{
position:absolute;
left:15px;
background:none;
border:none;
font-size:18px;
cursor:pointer;
color:#000;
}

/* PAGE */
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#f3f4f6;   /* SAME AS FEEDS */
color:#111;
}

.page{
padding:80px 20px 20px 20px;
}

/* CARD STYLE */
.card{
background:#ffffff;
padding:16px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.title{
font-weight:900;
margin-bottom:10px;
}

</style>
</head>

<body>


 

 
<div class="appHeader">
  <button class="backBtn" onclick="location.href='feeds.html'">←</button>
  Settings
</div>

<div class="page">



  <div class="card">
    <div class="title">Change Feeds Background</div>

    <input type="file" id="bgUpload" accept="image/*">

    <button onclick="uploadBackground()">Save Background</button>
  </div>

</div>
  
  <div class="card">
    <div class="title">Account</div>
    <div>Profile settings coming soon...</div>
  </div>

  <div class="card">
    <div class="title">Privacy</div>
    <div>Privacy settings coming soon...</div>
  </div>

  <div class="card">
    <div class="title">App</div>
    <div>App preferences coming soon...</div>
  </div>

</div>
<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, doc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCNlodsmEHrSXxgH0gTOcx4cAXwG8qmG9w",
authDomain:"seaconnect-d2baa.firebaseapp.com",
projectId:"seaconnect-d2baa"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const IMGBB_KEY="5b417e8de4a883f7425eeda12dc38f06";

let currentUID=null;

onAuthStateChanged(auth,(user)=>{
  if(user){
    currentUID=user.uid;
  }
});

window.uploadBackground = async function(){

if(!currentUID){
  alert("User not logged in");
  return;
}
  const file=document.getElementById("bgUpload").files[0];
  if(!file) return alert("Select image first");

  const formData=new FormData();
  formData.append("image",file);

  const res=await fetch(
  "https://api.imgbb.com/1/upload?key="+IMGBB_KEY,
  {method:"POST",body:formData}
  );

  const data=await res.json();

  if(data.success){
    await updateDoc(doc(db,"users",currentUID),{
      feedBackground:data.data.url
    });

    alert("Background Updated 🔥");
  }

};

</script>
</body>
</html>
